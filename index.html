<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3·1 만세운동 시각화 지도</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="data/만세운동_data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#000;overflow:hidden}
#map{width:100vw;height:100vh}
#fire-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}

.panel{position:absolute;background:rgba(8,8,14,0.9);border:1px solid rgba(255,110,20,0.3);border-radius:10px;color:#f0e0c0;backdrop-filter:blur(8px);z-index:10}

#title-panel{top:16px;left:16px;padding:12px 18px;border-left:4px solid #ff4500}
#title-panel h1{font-size:16px;font-weight:700;color:#ffd060;letter-spacing:1px}
#title-panel p{font-size:11px;color:#999;margin-top:4px;line-height:1.4}
#title-panel p a:hover{text-decoration:underline !important}

#layer-panel{top:16px;right:16px;padding:14px 16px;width:205px}
.sec-title{font-size:10px;font-weight:700;color:#ff7020;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,110,32,0.2)}
.row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.row input{accent-color:#ff6020;cursor:pointer;flex-shrink:0}
.row span{font-size:12px;color:#ddd}
.sec{margin-bottom:14px}
.sec:last-child{margin-bottom:0}

#anim-panel{bottom:24px;left:50%;transform:translateX(-50%);padding:14px 22px;min-width:620px;max-width:94vw}
#date-disp{font-size:14px;font-weight:700;color:#ffd060;letter-spacing:1px;text-shadow:0 0 8px rgba(255,160,0,.4);margin-right:10px;min-width:110px;text-align:right}
#timeline{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;cursor:pointer;outline:none;background:linear-gradient(to right,#ff6020 var(--p,0%),#2a2a2a var(--p,0%))}
#timeline::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#ffd060;box-shadow:0 0 6px rgba(255,200,0,.8);cursor:pointer}
.arow{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}
.btn{padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
#play-btn{background:linear-gradient(135deg,#ff4500,#ff8000);color:#fff;min-width:82px}
#play-btn:hover{filter:brightness(1.15)}
#reset-btn{background:rgba(255,255,255,.08);color:#ccc;border:1px solid #444}
#reset-btn:hover{background:rgba(255,255,255,.15)}
#speed-sel{background:#111;color:#ffd060;border:1px solid #444;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
#prog{font-size:11px;color:#777}

/* 팝업 */
#popup{position:absolute;z-index:20;display:none;max-width:290px;pointer-events:none}
.pop-in{background:rgba(8,8,14,.96);border:1px solid rgba(255,110,30,.5);border-radius:8px;padding:12px 14px;pointer-events:auto;position:relative}
.pop-title{font-size:13px;font-weight:700;color:#ffd060;margin-bottom:6px}
.pop-row{font-size:11px;color:#bbb;margin-bottom:3px}
.pop-url{display:inline-block;margin-top:6px;font-size:11px;color:#60aaff;text-decoration:none;word-break:break-all}
.pop-url:hover{text-decoration:underline}
.pop-x{position:absolute;top:7px;right:10px;cursor:pointer;color:#666;font-size:14px;line-height:1}

/* 범례 */
#legend{position:absolute;bottom:24px;left:16px;padding:10px 14px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-fire{background:radial-gradient(circle,#fff 0%,#ffa000 40%,#f02000 100%)}
.leg-mem{background:#ffd700;border:2px solid #fff}
.leg-txt{font-size:11px;color:#ccc}

/* 로딩 */
#loading{position:absolute;inset:0;background:#050508;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.load-fire{font-size:52px;animation:flk .4s infinite alternate}
@keyframes flk{from{opacity:1;transform:scale(1) rotate(-3deg)}to{opacity:.7;transform:scale(1.1) rotate(3deg)}}
#loading p{color:#ffd060;font-size:14px}
</style>
</head>
<body>
<div id="loading"><div class="load-fire">🔥</div><p>3·1 만세운동 지도 불러오는 중…</p></div>
<div id="map"></div>
<canvas id="fire-canvas"></canvas>

<div class="panel" id="title-panel">
  <h1>🔥 3·1 만세운동</h1>
  <p>1919년 독립운동 확산 기록<br><a href="https://hgis.history.go.kr/samil" target="_blank" style="color:#999;text-decoration:none">국사편찬위원회 삼일운동 데이터베이스</a></p>
</div>

<div class="panel" id="layer-panel">
  <div class="sec">
    <div class="sec-title">배경지도</div>
    <label class="row"><input type="radio" name="base" value="night" checked><span>브이월드 야간</span></label>
    <label class="row"><input type="radio" name="base" value="base"><span>브이월드 일반</span></label>
    <label class="row"><input type="radio" name="base" value="satellite"><span>브이월드 영상</span></label>
    <label class="row"><input type="radio" name="base" value="white"><span>브이월드 백지도</span></label>
  </div>
  <div class="sec">
    <div class="sec-title">레이어</div>
    <label class="row"><input type="checkbox" id="lyr-p" checked><span>만세운동</span></label>
    <label class="row"><input type="checkbox" id="lyr-m"><span>기념관 및 역사관</span></label>
  </div>
  <div class="sec">
    <div class="sec-title">출처 및 설명</div>
    <a href="https://unique-payment-110.notion.site/3-1-33e80db13da580d781a9f030417e0d69" target="_blank" style="font-size:11px;color:#60aaff;text-decoration:none">데이터 및 지도 설명 (Notion)</a>
  </div>
</div>

<div class="panel" id="anim-panel">
  <input type="range" id="timeline" min="0" max="1000" value="0">
  <div class="arow">
    <div id="date-disp">1919년 1월 1일</div>
    <button class="btn" id="play-btn">▶ 재생</button>
    <button class="btn" id="reset-btn">↺ 처음</button>
    <select id="speed-sel">
      <option value="1">1배속</option>
      <option value="2">2배속</option>
      <option value="5" selected>5배속</option>
      <option value="10">10배속</option>
      <option value="20">20배속</option>
    </select>
    <span id="prog">0 / 0 건</span>
  </div>
</div>

<div id="popup">
  <div class="pop-in">
    <span class="pop-x" id="pop-x">✕</span>
    <div class="pop-title" id="pop-title"></div>
    <div class="pop-row" id="pop-date"></div>
    <div class="pop-row" id="pop-cnt"></div>
    <a class="pop-url" id="pop-url" target="_blank" rel="noopener"></a>
  </div>
</div>

<script>
// ── 타일 URL ──────────────────────────────────────────────────────
const TILE = {
  night:     'https://xdworld.vworld.kr/2d/midnight/service/{z}/{x}/{y}.png',
  base:      'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
  satellite: 'https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg',
  white:     'https://xdworld.vworld.kr/2d/white/service/{z}/{x}/{y}.png',
  hybrid:    'https://xdworld.vworld.kr/2d/Hybrid/service/{z}/{x}/{y}.png'
};

// ── 기념관 데이터 ─────────────────────────────────────────────────
const MEMORIALS = [
  {name:'유관순 열사 사적지',          ll:[127.2296,36.7965], desc:'충남 천안시 동남구 병천면',   url:'https://www.cheonan.go.kr/yugwansun.do'},
  {name:'서대문형무소 역사관',          ll:[126.9578,37.5784], desc:'서울 서대문구 통일로 251',    url:'https://sphh.sscmc.or.kr/'},
  {name:'탑골공원',                    ll:[126.9868,37.5728], desc:'서울 종로구 종로 99',          url:'https://encykorea.aks.ac.kr/Article/E0058835'},
  {name:'독립기념관',                  ll:[127.1521,36.8601], desc:'충남 천안시 동남구 목천읍',    url:'https://i815.or.kr/'},
  {name:'화성 제암리 3·1운동 순국유적', ll:[127.0264,37.0744], desc:'경기 화성시 향남읍 제암리',   url:'https://www.heritage.go.kr/heri/cul/culSelectDetail.do?pageNo=1_1_1_1&ccbaCpno=1333102990000'},
  {name:'안중근의사기념관',             ll:[126.9897,37.5519], desc:'서울 중구 소월로 (남산)',      url:'https://www.ahnjunggeun.or.kr/index.html'},
  {name:'6·10만세 기념비',             ll:[126.9885,37.5715], desc:'서울 종로구 탑골공원 인근',    url:'https://mfis.mpva.go.kr/memorial/movementView.do?gubunCode=DR&sid=1966'},
  {name:'삼가장터 3.1만세운동 기념탑',  ll:[128.1695,35.5434], desc:'경남 합천군 삼가면',           url:'https://mfis.mpva.go.kr/memorial/movementView.do?gubunCode=DR&sid=394'},
  {name:'군산 3·1운동 100주년 기념관', ll:[126.7108,35.9676], desc:'전북 군산시',                  url:'https://museum.gunsan.go.kr/new/contents/exhibition601.jsp'},
  {name:'무오법정사 항일운동 기념탑',   ll:[126.5569,33.2597], desc:'제주 서귀포시',                url:'https://mfis.mpva.go.kr/memorial/movementView.do?gubunCode=DR&sid=36'},
];

// ── 데이터 준비 ───────────────────────────────────────────────────
const RAW   = window.PROTEST_DATA || {type:'FeatureCollection',features:[]};
const FEATS = RAW.features;
const DATES = [...new Set(FEATS.map(f=>f.properties.date))].sort();
const D_MIN = DATES[0], D_MAX = DATES[DATES.length-1];
const MS_MIN = new Date(D_MIN).getTime(), MS_MAX = new Date(D_MAX).getTime();
const TOTAL_MS = MS_MAX - MS_MIN;
const FIRE_DAYS = 7;   // 불꽃 지속 일수

function d2pct(d){ return Math.max(0,Math.min(1,(new Date(d)-MS_MIN)/TOTAL_MS)); }
function pct2d(p){ return new Date(MS_MIN + TOTAL_MS*p).toISOString().slice(0,10); }
function addDays(d,n){ return new Date(new Date(d).getTime()+n*86400000).toISOString().slice(0,10); }
function korDate(d){
  if(!d) return '';
  const [y,m,dd]=d.split('-');
  return `${y}년 ${+m}월 ${+dd}일`;
}

// ── 파티클 시스템 ─────────────────────────────────────────────────
const FC  = document.getElementById('fire-canvas');
const CTX = FC.getContext('2d');
let particles=[], activePts=[], newPts=[];
let mapReady=false, map;

function resizeFC(){FC.width=innerWidth;FC.height=innerHeight;}
addEventListener('resize',resizeFC);
resizeFC();

function mkParticle(ll, n, burst, ageDays){
  const ageRatio = Math.max(0, 1-ageDays/FIRE_DAYS);   // 1=새것, 0=꺼질직전
  const scale = Math.min(1+Math.log10(Math.max(n,1))*0.35, 2.4) * (0.25+ageRatio*0.75);
  const cnt = burst ? 22 : (ageRatio>0.6?2:1);
  for(let i=0;i<cnt;i++){
    particles.push({
      lng:ll[0], lat:ll[1],
      dx:(Math.random()-.5)*(burst?18:7),
      dy:burst?-(Math.random()*8):0,
      vx:(Math.random()-.5)*(burst?3:1.3),
      vy:-(Math.random()*3+1.5)*scale,
      life:1, decay:(burst?.04:.02)+Math.random()*.018,
      size:(Math.random()*4+2)*scale,
      hue:Math.random()*22,
      ageRatio
    });
  }
}

function renderParticles(){
  CTX.clearRect(0,0,FC.width,FC.height);
  if(!mapReady) return;

  // 버스트
  for(const pt of newPts) mkParticle(pt.ll, pt.n, true, 0);
  newPts=[];

  // 지속 방출 (뷰포트 내 포인트만)
  const b=map.getBounds(), spawnLimit=1500;
  let spawned=0;
  for(const pt of activePts){
    if(spawned>=spawnLimit) break;
    if(pt.ll[0]<b.getWest()||pt.ll[0]>b.getEast()||pt.ll[1]<b.getSouth()||pt.ll[1]>b.getNorth()) continue;
    mkParticle(pt.ll, pt.n, false, pt.age);
    spawned++;
  }

  // 파티클 상한
  if(particles.length>7000) particles.splice(0,particles.length-7000);

  // 그리기 (lighter = 발광 합성)
  CTX.globalCompositeOperation='lighter';
  const alive=[];
  for(const p of particles){
    p.dx+=p.vx; p.dy+=p.vy;
    p.vx*=.97; p.vy*=.985;
    p.life-=p.decay;
    if(p.life<=0) continue;
    alive.push(p);

    const base=map.project([p.lng,p.lat]);
    const x=base.x+p.dx, y=base.y+p.dy;
    const sz=p.size*(0.3+p.life*0.7);
    const prog=1-p.life;
    const hue=55-prog*55+p.hue;
    const lgt=prog<0.3?88:65-prog*42;
    const alpha=p.life*p.ageRatio*0.9;
    if(alpha<0.01) continue;

    const g=CTX.createRadialGradient(x,y,0,x,y,sz);
    g.addColorStop(0,   `hsla(${hue+15},100%,${Math.min(lgt+28,95)}%,${alpha})`);
    g.addColorStop(0.35,`hsla(${hue},100%,${lgt}%,${alpha*.75})`);
    g.addColorStop(1,   `hsla(${Math.max(hue-22,0)},80%,${Math.max(lgt-22,12)}%,0)`);
    CTX.fillStyle=g;
    CTX.beginPath(); CTX.arc(x,y,sz,0,Math.PI*2); CTX.fill();
  }
  CTX.globalCompositeOperation='source-over';
  particles=alive;
}

// ── 지도 스타일 ───────────────────────────────────────────────────
function buildStyle(baseTileUrl, is1919){
  // 1919 선택 시: night 타일 아래 + 1919 WMS 위
  const baseTile = is1919 ? TILE.night : baseTileUrl;
  return {
    version:8,
    sources:{
      base:    {type:'raster', tiles:[baseTile],     tileSize:256},
      hybrid:  {type:'raster', tiles:[TILE.hybrid],  tileSize:256},
      protests:{type:'geojson', data:RAW},
      memSrc:  {type:'geojson', data:{
        type:'FeatureCollection',
        features:MEMORIALS.map((m,i)=>({
          type:'Feature', id:i,
          geometry:{type:'Point',coordinates:m.ll},
          properties:{name:m.name,desc:m.desc,url:m.url}
        }))
      }}
    },
    layers:[
      // ① 배경 타일
      {id:'base',    type:'raster', source:'base',   paint:{'raster-opacity':1}},
      // ② 영상지도 하이브리드 라벨
      {id:'hybrid',  type:'raster', source:'hybrid', paint:{'raster-opacity':0}},
      // ④ 만세운동 히트맵
      {id:'pheat', type:'heatmap', source:'protests',
       filter:['<=',['get','date'],D_MIN],
       paint:{
         'heatmap-weight':  ['interpolate',['linear'],['get','n'],0,0.05,1000,1.0],
         'heatmap-intensity':2.0,
         'heatmap-color':['interpolate',['linear'],['heatmap-density'],
           0,'rgba(0,0,0,0)', 0.12,'rgba(160,30,0,0.4)',
           0.5,'rgba(255,70,0,0.75)', 0.85,'rgba(255,180,0,0.9)',
           1,'rgba(255,255,180,1)'],
         'heatmap-radius':['interpolate',['linear'],['zoom'],5,18,9,36],
         'heatmap-opacity':0.85
       }},
      // ⑤ 글로우
      {id:'pglow', type:'circle', source:'protests',
       filter:['<=',['get','date'],D_MIN],
       paint:{
         'circle-radius':['interpolate',['linear'],['get','n'],0,4,500,12,2000,22],
         'circle-color':'#ff6000','circle-blur':1.8,'circle-opacity':0.5
       }},
      // ⑥ 코어
      {id:'pcore', type:'circle', source:'protests',
       filter:['<=',['get','date'],D_MIN],
       paint:{
         'circle-radius':['interpolate',['linear'],['get','n'],0,2,500,5,2000,9],
         'circle-color':'#ffcc00','circle-opacity':0.9
       }},
      // ⑦ 기념관 글로우
      {id:'mglow', type:'circle', source:'memSrc', layout:{visibility:'none'},
       paint:{'circle-radius':14,'circle-color':'#ffd700','circle-blur':1.2,'circle-opacity':0.4}},
      // ⑧ 기념관 코어
      {id:'mcore', type:'circle', source:'memSrc', layout:{visibility:'none'},
       paint:{'circle-radius':7,'circle-color':'#ffd700',
               'circle-stroke-color':'#fff','circle-stroke-width':1.5}},
    ]
  };
}

// ── 지도 초기화 ───────────────────────────────────────────────────
let curBase='night';

map=new maplibregl.Map({
  container:'map',
  style: buildStyle(TILE.night, false),
  center:[127.8,36.5], zoom:6.8, minZoom:4.5, maxZoom:14
});
map.addControl(new maplibregl.NavigationControl(),'bottom-right');
map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-left');

map.on('error',e=>{
  console.error('[Map Error]',e.error?.message||e);
  document.getElementById('loading').style.display='none';
});
setTimeout(()=>{ document.getElementById('loading').style.display='none'; },10000);

map.on('load',()=>{
  mapReady=true;
  document.getElementById('loading').style.display='none';
  setFilter(D_MIN);
  rafLoop();
});

// ── 필터·활성포인트 갱신 ─────────────────────────────────────────
let prevDate=D_MIN;

function setFilter(dateStr){
  const fAll=['<=',['get','date'],dateStr];
  ['pheat','pglow','pcore'].forEach(id=>{ if(map.getLayer(id)) map.setFilter(id,fAll); });

  // 파티클용: 최근 7일 이내 활성 포인트
  const winStart = addDays(dateStr, -FIRE_DAYS);
  const curMs    = new Date(dateStr).getTime();
  activePts = FEATS
    .filter(f=>f.properties.date<=dateStr && f.properties.date>=winStart)
    .map(f=>({
      ll:  f.geometry.coordinates,
      n:   f.properties.n||0,
      age: (curMs - new Date(f.properties.date).getTime())/86400000
    }));

  // 새로 점화된 포인트 (이전 날짜 이후 등장)
  if(dateStr>prevDate){
    newPts = FEATS
      .filter(f=>f.properties.date>prevDate && f.properties.date<=dateStr)
      .slice(0,80)
      .map(f=>({ll:f.geometry.coordinates, n:f.properties.n||0}));
  }
  prevDate=dateStr;

  // UI
  document.getElementById('date-disp').textContent = korDate(dateStr);
  const total=FEATS.filter(f=>f.properties.date<=dateStr).length;
  document.getElementById('prog').textContent=`${total.toLocaleString()} / ${FEATS.length.toLocaleString()} 건`;
  const pct=d2pct(dateStr);
  const sl=document.getElementById('timeline');
  sl.value=Math.round(pct*1000);
  sl.style.setProperty('--p',(pct*100).toFixed(2)+'%');
}

// ── 애니메이션 루프 ───────────────────────────────────────────────
// speed배속: speed×3 일/초
const anim={playing:false,ms:MS_MIN,speed:5,lastTs:null};

function rafLoop(){
  requestAnimationFrame(function loop(ts){
    if(anim.playing){
      const dt = anim.lastTs ? Math.min(ts-anim.lastTs,100) : 0;
      // 단위 환산: dt[ms] → 경과일[days] → 날짜 ms
      const dtMs = anim.speed * 3 * (dt/1000) * 86400000;
      anim.ms = Math.min(anim.ms + dtMs, MS_MAX);
      
      const curDate = new Date(anim.ms).toISOString().slice(0,10);
      if(curDate!==prevDate){
        setFilter(curDate);
      }
      if(anim.ms>=MS_MAX){
        anim.playing=false;
        document.getElementById('play-btn').textContent='▶ 재생';
      }
    }
    anim.lastTs=ts;
    renderParticles();
    requestAnimationFrame(loop);
  });
}

// ── 배경지도 전환 ─────────────────────────────────────────────────
function switchBase(key){
  curBase=key;
  const tile=TILE[key];
  if(map.getSource('base'))    map.getSource('base').setTiles([tile]);
  if(map.getLayer('hybrid'))   map.setPaintProperty('hybrid','raster-opacity',key==='satellite'?0.9:0);
}

// ── UI 이벤트 ────────────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click',()=>{
  if(anim.ms>=MS_MAX){          // 끝에 도달 → 처음부터 재시작
    doReset();
  }
  anim.playing=!anim.playing;
  anim.lastTs=null;
  document.getElementById('play-btn').textContent=anim.playing?'⏸ 일시정지':'▶ 재생';
});

function doReset(){
  anim.playing=false; anim.ms=MS_MIN; prevDate=D_MIN;
  particles=[]; activePts=[]; newPts=[];
  setFilter(D_MIN);
  document.getElementById('play-btn').textContent='▶ 재생';
}
document.getElementById('reset-btn').addEventListener('click',doReset);

document.getElementById('speed-sel').addEventListener('change',e=>{
  anim.speed=parseInt(e.target.value);
});

document.getElementById('timeline').addEventListener('input',e=>{
  const pct=e.target.value/1000;
  const targetMs = MS_MIN + TOTAL_MS * pct;
  const d=pct2d(pct);
  e.target.style.setProperty('--p',(pct*100).toFixed(2)+'%');
  // 역방향 이동 시 파티클 리셋
  if(targetMs < anim.ms){
    particles=[]; activePts=[]; newPts=[];
    prevDate=D_MIN;
  }
  anim.ms=targetMs;
  setFilter(d);
});

document.querySelectorAll('input[name="base"]').forEach(r=>{
  r.addEventListener('change',e=>switchBase(e.target.value));
});

document.getElementById('lyr-p').addEventListener('change',e=>{
  ['pheat','pglow','pcore'].forEach(id=>{
    if(map.getLayer(id)) map.setLayoutProperty(id,'visibility',e.target.checked?'visible':'none');
  });
  FC.style.display=e.target.checked?'':'none';
});

document.getElementById('lyr-m').addEventListener('change',e=>{
  ['mglow','mcore'].forEach(id=>{
    if(map.getLayer(id)) map.setLayoutProperty(id,'visibility',e.target.checked?'visible':'none');
  });
});

// ── 팝업 ─────────────────────────────────────────────────────────
const popup=document.getElementById('popup');
document.getElementById('pop-x').addEventListener('click',()=>popup.style.display='none');
map.on('move',()=>popup.style.display='none');

function showPopup(props,lngLat){
  document.getElementById('pop-title').textContent=props.name||'(이름 없음)';
  document.getElementById('pop-date').textContent=props.date?'📅 '+korDate(props.date):(props.desc?'📍 '+props.desc:'');
  document.getElementById('pop-cnt').textContent=
    props.n>0?`👥 참가자 최대 ${(+props.n).toLocaleString()}명`:(props.desc&&props.date?'📍 '+props.desc:'');
  
  const ua=document.getElementById('pop-url');
  let detailUrl = props.url;
  // props.url이 없고 실제 사건 ID가 있는 경우 상세 페이지 URL 생성
  if(!detailUrl && props.id && !props.id.startsWith('x_')){
    detailUrl = `https://hgis.history.go.kr/samil/IDS/DEMONS/${props.id}`;
  }

  if(detailUrl){
    ua.href=detailUrl;
    ua.textContent='🔗 상세정보 (국사편찬위원회)';
    ua.target = '_blank';
    ua.style.display='block';
  } else {
    ua.style.display='none';
  }
  const pt=map.project(lngLat);
  popup.style.left=(pt.x+14)+'px';
  popup.style.top=(pt.y-56)+'px';
  popup.style.display='block';
}

['pcore','mcore'].forEach(id=>{
  map.on('click',id,e=>{
    map.getCanvas().style.cursor='';
    showPopup(e.features[0].properties,e.lngLat);
  });
  map.on('mouseenter',id,()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave',id,()=>map.getCanvas().style.cursor='');
});
</script>
</body>
